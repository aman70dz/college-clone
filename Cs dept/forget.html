<html>
    <head>
        <title>Forget Password</title>
        <style>
            body {
                margin: 0;
                padding: 0;
            }
            #universityName
            {
                margin-left: 60px;
                margin-top: -35px;
                font-size: 22px;
            }
            #divForget
            {
                height: 300px;
                width: 97%;
                background-color:white;
                margin-left: 20px;
                margin-top: 0; 
                border:1px solid #2875b3;
            }
            #divRegistration
            {
                height:35px;
                width:100%;
                background-color: #2875b3;
                position:relative;
            }
            #inputEmail
            {
                margin-top: 20px; 
            }
            #inputDOB
            {
                 margin-top: 80px;
            }
            #inputEmail,#inputDOB
            {
                position: absolute;
                margin-left: 250px;
                width: 200px; 
                height: 30px;  
                border:1px solid black;
            }
            #mobileNO
            {
                position: absolute;
                margin-left: 722px;
                margin-top: 20px;
                width: 200px;
                height: 30px; 
                border:1px solid black;
            }
            #submit,#reset
            {
                position: absolute; 
                top: 5px; 
                width: 160px; 
                height: 20px; 
                background-color: #2875b3; 
                color:white; 
                border:none; 
                border-radius: 2px; 
                cursor: pointer;
            }
    </style>
    </head>
<body>
    <form action="forget.html" method="post">
    <img src="image\utulogo.png" alt="Utu Logo" style="width:50px; height:50px;">
    <p id="universityName">Uka Tarsadia University</p>
    <div id="divForget">
       <div id="divRegistration">
            <h3 style="color:white; position:absolute; left:10px; top:-12px;">Registration</h3>
       </div>
        <label for="email" style="margin-left: 200px; margin-top: 22px; font-size: 18px; position: absolute;">Email:</label>
            <input id="inputEmail" type="email" name="email" placeholder="Enter your email">
        <label for="dob" style="margin-left: 143px; margin-top: 84px; font-size: 18px; position: absolute;">Date Of Birth:</label>
            <input id="inputDOB" type="date"  name="dob">
        
        <label for="mobileNO" style="margin-left: 600px; margin-top: 22px; font-size: 18px; position: absolute;">Mobile Number:</label>
            <input id="mobileNO" type="tel" name="mobileNO" placeholder="Enter your mobile number">
        <div style="height:35px; width:100%; margin-top:230px; border-top: 1px solid #2875b3; position:relative;">
            <input id="submit" type="submit" style="left: 10px;" value="Request New Password">
            <input id="reset" type="reset" style="left: 250px;" value="Reset">
        </div>
    </div>
    <p style="margin-top: 180px; color:gray;">© 2026 - Uka Tarsadia University</p>
</form>
</body>          
</html>
